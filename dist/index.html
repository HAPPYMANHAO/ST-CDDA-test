<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
:root{--bg:#030406;--panel:#06090c;--line:#334155;--dim:#64748b;--text:#cbd5e1;--green:#22c55e;--cyan:#22d3ee;--red:#ef4444;--yellow:#eab308}
*{box-sizing:border-box}body{margin:0;background:#000;color:var(--text);font-family:"Consolas","Lucida Console","Courier New",monospace;font-size:13px}.cdda-root{min-height:560px;background:radial-gradient(circle at center,#0b1118 0,#030406 52%,#000 100%);border:1px solid #1e293b;padding:10px;position:relative;overflow:hidden}.cdda-root:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.025),rgba(255,255,255,.025) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:3}.cdda-frame{position:relative;z-index:2;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:10px;min-height:540px}.box{background:rgba(6,9,12,.96);border:1px solid var(--line);box-shadow:inset 0 0 36px rgba(0,0,0,.75)}.title{color:var(--dim);border-bottom:1px solid #1e293b;padding:8px 10px;font-weight:bold;letter-spacing:.12em}.main{display:flex;flex-direction:column;min-height:540px}.screen{flex:1;padding:14px;overflow:auto;white-space:pre-wrap;line-height:1.65}.cmd{display:flex;gap:8px;border-top:1px solid #1e293b;padding:10px;background:#020617}.cmd span{color:var(--green);font-weight:bold}.cmd input{flex:1;background:transparent;border:0;outline:0;color:#fff;font-family:inherit}.opts{display:grid;gap:6px;margin-top:12px}.opt,.btn{background:#020617;color:var(--text);border:1px solid #334155;padding:7px 9px;font-family:inherit;text-align:left;cursor:pointer}.opt:hover,.btn:hover{border-color:var(--cyan);color:#fff}.side{display:grid;grid-template-rows:auto auto auto auto 1fr;gap:10px}.section{padding:10px}.sec-title{color:var(--cyan);border-bottom:1px dashed #334155;margin-bottom:8px;padding-bottom:4px}.row{display:flex;justify-content:space-between;gap:8px;margin:5px 0}.bar{height:10px;border:1px solid #475569;background:#020617;position:relative}.bar i{display:block;height:100%;background:var(--green)}.bar.red i{background:var(--red)}.bar.yellow i{background:var(--yellow)}.hpgrid{display:grid;grid-template-columns:42px 1fr 34px;gap:5px;align-items:center}.map{color:#94a3b8;line-height:1.25;white-space:pre}.modal{display:none;position:absolute;inset:32px;z-index:5;background:#020617;border:1px solid #64748b;box-shadow:0 0 0 9999px rgba(0,0,0,.62),inset 0 0 60px #000}.modal.on{display:block}.modal-head{display:flex;justify-content:space-between;border-bottom:1px solid #334155;padding:10px;color:var(--cyan);font-weight:bold}.modal-body{padding:12px;max-height:420px;overflow:auto}.close{background:#111827;color:#fff;border:1px solid #475569;font-family:inherit;cursor:pointer}.pill{display:inline-block;border:1px solid #334155;padding:3px 6px;margin:3px;color:#cbd5e1;background:#020617}.warn{color:var(--yellow)}.bad{color:var(--red)}.good{color:var(--green)}@media(max-width:760px){.cdda-frame{grid-template-columns:1fr}.side{grid-template-rows:auto}.cdda-root{min-height:900px}}
</style>
</head>
<body>
<div class="cdda-root" id="cdda-root">
  <div class="cdda-frame">
    <div class="box main">
      <div class="title">C:\$ CDDA_SURVIVAL_PROTOCOL v3.0</div>
      <div class="screen" id="cdda-main">CATACLYSM: DARK DAYS AHEAD
XE-037 MONITOR: BOOTING

正在读取楼层文本与 MVU 变量...</div>
      <div class="cmd"><span>&gt;</span><input id="cdda-input" placeholder="输入你的行动..." autocomplete="off"></div>
    </div>
    <div class="side">
      <div class="box section"><div class="sec-title">生命值</div><div id="cdda-hp"></div></div>
      <div class="box section"><div class="sec-title">属性与技能</div><div id="cdda-stat"></div></div>
      <div class="box section"><div class="sec-title">装备与状态</div><div id="cdda-eq"></div><div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px"><button class="btn" data-open="inv">物品栏</button><button class="btn" data-open="mut">变异/CBM</button><button class="btn" data-open="combat">战斗</button></div></div>
      <div class="box section"><div class="sec-title">环境信息</div><div id="cdda-env"></div></div>
      <div class="box section"><div class="sec-title">局部地图</div><div class="map" id="cdda-map"></div></div>
    </div>
  </div>
  <div class="modal" id="modal-inv"><div class="modal-head">物品栏 <button class="close">关闭</button></div><div class="modal-body" id="cdda-inv"></div></div>
  <div class="modal" id="modal-mut"><div class="modal-head">变异与 CBM <button class="close">关闭</button></div><div class="modal-body" id="cdda-mut"></div></div>
  <div class="modal" id="modal-combat"><div class="modal-head">战斗信息 <button class="close">关闭</button></div><div class="modal-body" id="cdda-combat"></div></div>
</div>
<script>
(function(){
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function num(v,d){v=Number(v);return Number.isFinite(v)?v:d}
function pct(v,m){return Math.max(0,Math.min(100,Math.round(num(v,0)/num(m,100)*100)))}
function bar(v,m,cls){var p=pct(v,m);return '<div class="bar '+(cls||'')+'"><i style="width:'+p+'%"></i></div>'}
function val(o,k,d){return o&&o[k]!=null?o[k]:d}
function getVars(){try{if(typeof getAllVariables==='function'){var a=getAllVariables();return a&&a.stat_data?a.stat_data:a}if(typeof Mvu!=='undefined'&&Mvu&&typeof Mvu.getMvuData==='function'){var m=Mvu.getMvuData({type:'message',message_id:'latest'});return m&&m.stat_data?m.stat_data:{}}}catch(e){}return {}}
function getMsgs(){try{if(typeof getLastMessageId==='function'&&typeof getChatMessages==='function'){var id=getLastMessageId();var ms=getChatMessages(id,{role:'assistant'});if(!ms||!ms.length)ms=getChatMessages(id);return ms&&ms[0]?ms[0].message:''}}catch(e){}return ''}
function parseMsg(t){t=String(t||'');var m=t.match(/<maintext>([\s\S]*?)(?:<\/maintext>|$)/i);var o=t.match(/<option>([\s\S]*?)(?:<\/option>|$)/i);var main=m?m[1].trim():t.replace(/<StatusPlaceHolderImpl\s*\/?>/gi,'').trim();var opts=[];if(o){o[1].split(/\n+/).map(function(x){return x.trim()}).filter(Boolean).forEach(function(x,i){var mm=x.match(/^([A-Z])\.\s*(.*)$/);opts.push({id:mm?mm[1]:String.fromCharCode(65+i),text:mm?mm[2]:x})})}return {main:main,opts:opts}}
function data(){var v=getVars();return {w:v['世界']||{},p:v['玩家']||{},c:v['战斗']||{},g:v['进度']||{}}}
function hp(name,v){return '<div>'+esc(name)+'</div>'+bar(v,100,v<35?'red':v<65?'yellow':'')+'<div>'+Math.round(num(v,0))+'</div>'}
function render(){var d=data(),p=d.p,w=d.w,c=d.c,msg=parseMsg(getMsgs());$('cdda-main').innerHTML=esc(msg.main||'CATACLYSM: DARK DAYS AHEAD\nXE-037 MONITOR: READY\n\n等待下一轮行动...')+(msg.opts.length?'<div class="opts">'+msg.opts.map(function(o){return '<button class="opt" data-opt="'+esc(o.id)+'">['+esc(o.id)+'] '+esc(o.text)+'</button>'}).join('')+'</div>':'');$('cdda-hp').innerHTML='<div class="hpgrid">'+hp('头',val(p,'HP_头',100))+hp('躯',val(p,'HP_躯干',val(p,'HP_躯',100)))+hp('臂',val(p,'HP_手臂',val(p,'HP_臂',100)))+hp('腿',val(p,'HP_腿',100))+'</div>';$('cdda-stat').innerHTML='<div class="row"><span>力量</span><b>'+esc(val(p,'力量',8))+'</b></div><div class="row"><span>敏捷</span><b>'+esc(val(p,'敏捷',8))+'</b></div><div class="row"><span>智力</span><b>'+esc(val(p,'智力',8))+'</b></div><div class="row"><span>感知</span><b>'+esc(val(p,'感知',8))+'</b></div><div class="row"><span>疼痛</span><b class="bad">'+esc(val(p,'疼痛',0))+'</b></div>'+bar(val(p,'疼痛',0),100,'red')+'<div class="row"><span>疲劳</span><b class="warn">'+esc(val(p,'疲劳',0))+'</b></div>'+bar(val(p,'疲劳',0),100,'yellow')+'<div class="row"><span>耐力</span><b class="good">'+esc(val(p,'耐力',100))+'</b></div>'+bar(val(p,'耐力',100),val(p,'最大耐力',100));$('cdda-eq').innerHTML='<div class="row"><span>武器</span><b>'+esc(val(p,'武器','长木棍'))+'</b></div><div class="row"><span>衣物</span><b>'+esc(val(p,'衣物','幸存者衣物'))+'</b></div><div class="row"><span>负重</span><b>'+esc(val(p,'负重','轻'))+'</b></div>';$('cdda-env').innerHTML='<div class="row"><span>区域</span><b>'+esc(val(w,'当前区域','紧急避难所'))+'</b></div><div class="row"><span>天气</span><b>'+esc(val(w,'天气','晴'))+'</b></div><div class="row"><span>时间</span><b>'+esc(val(w,'时间','早晨'))+'</b></div><div class="row"><span>温度</span><b>'+esc(val(w,'温度','15C'))+'</b></div>';$('cdda-map').textContent='┌────────────┐\n│ . . F . .  │\n│ . ^ . . F  │\n│ . . + . .  │\n│ F . . . .  │\n└────────────┘';var inv=val(p,'物品栏',{});$('cdda-inv').innerHTML=Object.keys(inv).length?Object.keys(inv).map(function(k){return '<div class="row"><span>'+esc(k)+'</span><b>'+esc(inv[k])+'</b></div>'}).join(''):'<span class="dim">空</span>';$('cdda-mut').innerHTML='<div>变异</div>'+list(val(p,'变异',[]))+'<div style="margin-top:12px">CBM</div>'+list(val(p,'CBM',[]));$('cdda-combat').innerHTML='<div class="row"><span>状态</span><b>'+esc(val(c,'状态','未交战'))+'</b></div><div class="row"><span>敌人</span><b>'+esc(val(c,'敌人','无'))+'</b></div><div class="row"><span>敌人HP</span><b>'+esc(val(c,'敌人HP','-'))+'</b></div>'}
function list(x){if(!Array.isArray(x)||!x.length)return '<span class="pill">无</span>';return x.map(function(i){return '<span class="pill">'+esc(i)+'</span>'}).join('')}
async function send(t){if(!t)return;try{if(typeof createChatMessages==='function')await createChatMessages([{role:'user',message:t}],{refresh:'none'});if(typeof generate==='function')await generate({user_input:t,should_stream:true})}catch(e){console.error('[CDDA]',e)}}
document.addEventListener('click',function(e){var b=e.target.closest('[data-open]');if(b){$('modal-'+b.getAttribute('data-open')).classList.add('on')}var c=e.target.closest('.close');if(c)c.closest('.modal').classList.remove('on');var o=e.target.closest('[data-opt]');if(o)send(o.textContent.replace(/^\[[A-Z]\]\s*/,''))});$('cdda-input').addEventListener('keydown',function(e){if(e.key==='Enter'){send(this.value);this.value=''}});render();setInterval(render,1500);try{if(typeof eventOn==='function'){eventOn('MESSAGE_UPDATED',render);eventOn('MESSAGE_RECEIVED',function(){setTimeout(render,500)})}}catch(e){}
})();
</script>
</body>
