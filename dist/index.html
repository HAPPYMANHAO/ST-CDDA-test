<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

/* === Tailwind-alike design tokens === */
:root {
  --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
  --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b;
  --slate-900: #0f172a; --slate-950: #020617;
  --cyan-400: #22d3ee; --cyan-500: #06b6d4; --cyan-700: #0e7490;
  --green-400: #4ade80; --green-500: #22c55e; --green-700: #15803d;
  --red-400: #f87171; --red-500: #ef4444; --red-600: #dc2626;
  --red-700: #b91c1c; --red-900: #7f1d1d;
  --orange-400: #fb923c; --orange-500: #f97316;
  --yellow-400: #facc15; --yellow-500: #eab308;
  --pink-400: #f472b6; --pink-500: #ec4899;
  --white: #ffffff; --black: #000000;
  /* our custom */
  --bg-root: #030406; --bg-panel: #06090c; --bg-card: rgba(0,0,0,.4);
}

/* === Reset & base === */
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  margin:0;padding:0;background:var(--bg-root);color:var(--slate-300);
  font-family:"JetBrains Mono","Consolas","Courier New",monospace;
  font-size:12px;line-height:1.5;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;letter-spacing:.04em;
}

/* CRT scanlines */
.crt{position:relative}
.crt::before{
  content:"";display:block;position:absolute;inset:0;z-index:50;pointer-events:none;
  background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,.25) 50%),
    linear-gradient(90deg,rgba(255,0,0,.06),rgba(0,255,0,.02),rgba(0,0,255,.06));
  background-size:100% 2px,3px 100%;opacity:.8;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#050505;border-left:1px solid var(--slate-800)}
::-webkit-scrollbar-thumb{background:var(--slate-700);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:var(--slate-600)}

/* === Layout === */
.app-root{
  width:100%;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:row;
  padding:8px;gap:8px;position:relative;z-index:1;
}
/* responsive */
@media(max-width:1024px){.term-side{width:310px}}
@media(max-width:860px){
  .app-root{flex-direction:column;padding:4px;gap:4px}
  .term-side{width:100%;max-height:none;flex-direction:row;flex-wrap:wrap;gap:4px;overflow-y:visible}
  .term-side>*{flex:1;min-width:210px;max-width:calc(50% - 4px)}
  .term-main{min-height:300px;max-height:none}
  .term-screen{max-height:42vh}
}
@media(max-width:520px){
  .term-side>*{min-width:100%;max-width:100%}
  .term-main{min-height:240px}
  .term-screen{max-height:32vh}
  .term-bar .bar-btn{font-size:9px;padding:2px 5px}
  .term-bar .bar-title{font-size:9px}
  .term-opts{grid-template-columns:1fr}
  .inv-grid,.mut-grid{grid-template-columns:1fr}
  .hp-flex{flex-direction:column;gap:2px}
  .combat-top{flex-direction:column}
  html,body{font-size:11px}
}

/* HUD corners */
.hud-corner{
  position:absolute;width:36px;height:36px;z-index:10;pointer-events:none;
  border-color:var(--slate-700);opacity:.5;
}
.hud-tl{top:10px;left:10px;border-top:2px solid;border-left:2px solid}
.hud-tr{top:10px;right:10px;border-top:2px solid;border-right:2px solid}
.hud-bl{bottom:10px;left:10px;border-bottom:2px solid;border-left:2px solid}
.hud-br{bottom:10px;right:10px;border-bottom:2px solid;border-right:2px solid}

/* === Main terminal (left) === */
.term-main{
  flex:1;min-width:0;display:flex;flex-direction:column;
  border:1px solid var(--slate-800);background:var(--bg-panel);
  box-shadow:inset 0 0 100px rgba(0,0,0,1);position:relative;overflow:hidden;
  min-height:380px;
}

/* Top bar */
.term-bar{
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--slate-800);padding:6px 12px;
  background:rgba(0,0,0,.8);position:relative;
}
.term-bar::after{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(6,182,212,.5),transparent);
}
.term-bar .bar-title{
  color:var(--slate-500);font-size:10px;letter-spacing:.2em;font-weight:700;
  animation:cdda-pulse 3s ease-in-out infinite;
}
@keyframes cdda-pulse{0%,100%{opacity:.6}50%{opacity:1}}
.term-bar .bar-btns{display:flex;gap:4px}
.term-bar .bar-btn{
  background:transparent;color:var(--slate-400);border:1px solid var(--slate-800);
  font-family:inherit;font-size:10px;padding:3px 8px;cursor:pointer;
  text-transform:uppercase;letter-spacing:.06em;transition:all .15s;
}
.term-bar .bar-btn:hover{color:var(--white);background:var(--slate-800);border-color:var(--slate-600)}
.term-bar .bar-btn.btn-inv:hover{color:var(--white)}
.term-bar .bar-btn.btn-mut:hover{color:var(--green-400);background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3)}
.term-bar .bar-btn.btn-com:hover{color:var(--red-400);background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3)}

/* Chat screen */
.term-screen{
  flex:1;padding:12px 16px;overflow-y:auto;white-space:pre-wrap;
  word-break:break-word;line-height:1.7;font-size:12px;
}
.term-screen .sys-boot{color:var(--slate-600);font-weight:700;line-height:1.6;font-size:11px;letter-spacing:.08em}
.term-screen .msg-row{color:var(--slate-300);line-height:1.8;max-width:800px;
  border-left:2px solid var(--slate-700);padding:8px 0 8px 14px;
  background:linear-gradient(90deg,rgba(15,23,42,.3),transparent)}
.term-screen .msg-cmd{color:var(--slate-500);display:flex;align-items:center;gap:8px;margin-top:12px}
.term-screen .msg-cmd .gprompt{color:var(--green-500);font-weight:700}
.term-screen .term-loader{color:var(--slate-500);font-size:10px;display:flex;align-items:center;gap:6px;margin-top:16px}
.term-screen .term-loader i{display:inline-block;width:8px;height:12px;background:var(--slate-600);animation:cdda-blink 1.2s steps(1) infinite}
@keyframes cdda-blink{0%,100%{opacity:.2}50%{opacity:1}}

/* Options */
.term-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 16px 10px}
.term-opt{
  background:transparent;color:var(--slate-400);border:1px solid var(--slate-800);
  font-family:inherit;font-size:11px;padding:7px 10px;text-align:left;cursor:pointer;
  transition:all .15s;position:relative;overflow:hidden;
}
.term-opt::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,.08),transparent);
  transform:translateX(-110%);transition:transform .4s;
}
.term-opt:hover::before{transform:translateX(110%)}
.term-opt:hover{color:var(--white);border-color:var(--cyan-500);box-shadow:0 0 15px rgba(34,211,238,.15)}

/* Input */
.term-cmd{
  display:flex;align-items:center;gap:8px;
  border-top:1px solid var(--slate-800);padding:8px 16px;
  background:rgba(0,0,0,.9);
}
.term-cmd .gprompt{color:var(--green-500);font-weight:700;font-size:14px;
  text-shadow:0 0 6px rgba(34,197,94,.8)}
.term-cmd input{
  flex:1;background:transparent;border:0;outline:0;
  color:var(--white);font-family:inherit;font-size:12px;
  caret-color:var(--green-500);
}
.term-cmd input::placeholder{color:var(--slate-700)}

/* === Side panel (right) === */
.term-side{
  width:380px;max-height:calc(100vh - 16px);max-height:calc(100dvh - 16px);
  flex-shrink:0;display:flex;flex-direction:column;gap:6px;
  overflow-y:auto;padding-right:2px;
}

/* fieldset card - matches reference StatusPanel */
fieldset.fs-card{
  min-inline-size:auto;width:100%;
  border:1px solid var(--slate-700);padding:6px 10px 10px;
  background:rgba(0,0,0,.4);position:relative;
  box-shadow:inset 0 0 60px rgba(0,0,0,.8);transition:border-color .15s;
}
.fs-card:hover{border-color:var(--slate-600)}
.fs-card legend{
  padding:0 6px;color:var(--slate-400);font-size:10px;letter-spacing:.12em;
  font-weight:700;text-transform:uppercase;user-select:none;
}

/* HP row */
.hp-row{display:flex;align-items:center;font-size:12px;margin:3px 0}
.hp-row:hover .hp-label{color:var(--slate-200)}
.hp-row .hp-label{color:var(--slate-400);width:36px;text-align:right;margin-right:8px;transition:color .15s;flex-shrink:0}
.hp-row .hp-bar{font-weight:700;letter-spacing:.08em}
.hp-row .hp-val{color:var(--slate-500);margin-left:auto;font-size:10px;font-variant-numeric:tabular-nums}
.hp-green .hp-bar{color:var(--green-500);text-shadow:0 0 5px rgba(34,197,94,.3)}
.hp-cyan .hp-bar{color:var(--cyan-400);text-shadow:0 0 5px rgba(34,211,238,.3)}
.hp-red .hp-bar{color:var(--red-400);text-shadow:0 0 5px rgba(248,113,113,.3)}
.hp-orange .hp-bar{color:var(--orange-400);text-shadow:0 0 5px rgba(251,146,60,.3)}
.hp-dim .hp-bar{color:var(--slate-700)}
.hp-flex{display:flex;justify-content:space-between;gap:4px}
.hp-divider{width:100%;height:0;border-bottom:1px dashed var(--slate-800);margin:6px 0}

/* Stat grid */
.stat-grid{display:flex;justify-content:space-between;font-size:12px;color:var(--slate-400);margin-top:4px}
.stat-grid span .stv{color:var(--white);margin-left:4px;text-shadow:0 0 3px rgba(255,255,255,.5)}
.stat-list{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:12px;color:var(--slate-500);margin-top:4px}
.stat-list span .sv-cyan{color:var(--cyan-400)}
.stat-list span .sv-dim{color:var(--slate-400)}

/* Eq row */
.eq-row{display:flex;align-items:center;font-size:12px;margin:4px 0}
.eq-row .eq-label{color:var(--slate-500);width:48px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.eq-row .eq-val-w{color:var(--white);text-shadow:0 0 3px rgba(255,255,255,.4)}
.eq-row .eq-val-p{color:var(--pink-400);text-shadow:0 0 3px rgba(244,114,182,.4)}
.eq-row .eq-val-d{color:var(--slate-400)}
.eq-status{display:flex;justify-content:space-between;font-size:10px;color:var(--slate-500);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.eq-status b{color:var(--green-500);font-weight:700}

/* Env */
.env-row{display:flex;align-items:center;font-size:12px;margin:4px 0}
.env-row .env-label{color:var(--slate-500);font-size:10px;text-transform:uppercase;letter-spacing:.04em;margin-right:8px}
.env-row .env-time{color:var(--slate-200);letter-spacing:.08em}
.env-row .env-weather{color:var(--yellow-400);font-weight:700;text-shadow:0 0 3px rgba(250,204,21,.5)}
.env-glyph{display:inline-flex;align-items:center;gap:6px}
.env-glyph .glyph{
  display:inline-block;min-width:18px;text-align:center;font-weight:700;padding:1px 6px;line-height:1.5;
}
.env-glyph .glyph-s{background:var(--white);color:var(--black);box-shadow:0 0 10px rgba(255,255,255,.7)}
.env-glyph .glyph-f{background:#17331f;color:var(--green-400);border:1px solid #295234}
.env-glyph .glyph-w{background:#121518;color:#7d806e;border:1px solid #3a3d34}
.env-glyph .glyph-h{background:#4a2a14;color:#e8b878;border:1px solid #65402e}
.env-glyph .glyph-c{background:#192434;color:#a0bdd0;border:1px solid #395068}
.env-loc{color:var(--white);font-weight:700;letter-spacing:.04em}

/* === Modals === */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.8);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.on{display:flex;animation:modFade .2s ease-out}
@keyframes modFade{from{opacity:0}to{opacity:1}}
.modal-box{
  width:100%;max-width:640px;max-height:82vh;
  border:1px solid var(--slate-600);background:#07090b;
  box-shadow:0 0 60px rgba(0,0,0,1),0 0 30px rgba(34,211,238,.05);
  display:flex;flex-direction:column;
  animation:modSlide .2s ease-out;
}
@keyframes modSlide{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
.modal-box:hover{border-color:var(--slate-500)}
.modal-hd{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:1px solid var(--slate-700);
  background:rgba(15,23,42,.8);
}
.modal-hd .mh-title{
  color:var(--white);font-size:11px;letter-spacing:.08em;font-weight:700;
  text-shadow:0 0 5px rgba(255,255,255,.4);
}
.modal-hd .mh-close{
  background:transparent;color:var(--slate-500);border:1px solid transparent;
  font-family:inherit;font-size:10px;padding:3px 8px;cursor:pointer;
  text-transform:uppercase;transition:all .15s;
}
.modal-hd .mh-close:hover{color:var(--red-500);border-color:var(--red-900);background:var(--slate-800)}
.modal-bd{
  padding:12px;overflow-y:auto;flex:1;font-size:12px;
}

/* Inventory grid */
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
@media(max-width:500px){.inv-grid{grid-template-columns:1fr}}
.inv-cat .inv-cat-hd{
  color:var(--cyan-400);border-bottom:1px solid var(--slate-800);
  padding-bottom:4px;margin-bottom:8px;font-size:11px;
  text-transform:uppercase;letter-spacing:.08em;font-weight:700;
  text-shadow:0 0 3px rgba(34,211,238,.4);
}
.inv-cat .inv-item{
  display:flex;justify-content:space-between;padding:4px 6px;
  border-left:2px solid transparent;transition:all .15s;cursor:pointer;
}
.inv-cat .inv-item:hover{border-left-color:var(--cyan-500);background:rgba(15,23,42,.5)}
.inv-cat .inv-item .inv-name{color:var(--slate-300)}
.inv-cat .inv-item:hover .inv-name{color:var(--white)}
.inv-cat .inv-item .inv-qty{color:var(--slate-500)}
.inv-cat .inv-item .inv-note{color:var(--slate-500);font-size:10px;margin-left:6px}

/* Mutation/CBM */
.mut-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;min-height:250px}
@media(max-width:500px){.mut-grid{grid-template-columns:1fr}}
.mut-col{border-right:1px solid var(--slate-800);padding-right:12px}
.mut-col:last-child{border-right:none;padding-right:0}
.mut-col .mut-hd{
  border-bottom:1px solid var(--slate-800);padding-bottom:6px;margin-bottom:8px;
  font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;
}
.mut-col .mut-hd.mh-green{color:var(--green-500);box-shadow:0 1px rgba(74,222,128,.1)}
.mut-col .mut-hd.mh-cyan{color:var(--cyan-500);box-shadow:0 1px rgba(6,182,212,.1)}
.mut-entry{
  display:flex;align-items:flex-start;gap:8px;padding:6px;
  border:1px solid;margin-bottom:4px;transition:all .15s;cursor:pointer;
}
.mut-entry.mut-good{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08)}
.mut-entry.mut-good:hover{background:rgba(74,222,128,.15)}
.mut-entry.mut-bad{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)}
.mut-entry.mut-bad:hover{background:rgba(248,113,113,.15)}
.mut-entry.mut-neut{border-color:rgba(244,114,182,.2);background:rgba(244,114,182,.05)}
.mut-entry.mut-neut:hover{background:rgba(244,114,182,.1)}
.mut-entry .mut-marker{color:var(--slate-600);margin-top:1px;flex-shrink:0}
.mut-entry .mut-name{font-weight:700;font-size:11px;margin-bottom:1px}
.mut-entry .mut-desc{color:var(--slate-500);font-size:10px;line-height:1.4}
.mut-good .mut-name{color:var(--green-400);text-shadow:0 0 3px rgba(74,222,128,.5)}
.mut-bad .mut-name{color:var(--red-400);text-shadow:0 0 3px rgba(248,113,113,.5)}
.mut-neut .mut-name{color:var(--pink-400);text-shadow:0 0 3px rgba(244,114,182,.5)}

/* CBM entries */
.cbm-entry{
  padding:8px;border-left:2px solid var(--slate-700);
  background:rgba(15,23,42,.2);margin-bottom:4px;transition:all .15s;cursor:pointer;
}
.cbm-entry:hover{background:rgba(15,23,42,.5)}
.cbm-entry.cbm-active{border-left-color:var(--cyan-500);background:rgba(6,182,212,.05);
  box-shadow:inset 0 0 15px rgba(6,182,212,.05);position:relative;overflow:hidden}
.cbm-entry.cbm-active::after{
  content:"";position:absolute;top:0;right:0;width:36px;height:36px;
  background:rgba(6,182,212,.1);border-radius:50%;filter:blur(12px);
}
.cbm-entry .cbm-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px}
.cbm-entry .cbm-name{font-weight:700;letter-spacing:.02em}
.cbm-active .cbm-name{color:var(--cyan-300);text-shadow:0 0 4px rgba(103,232,249,.5)}
.cbm-entry .cbm-tag{font-size:9px;text-transform:uppercase;letter-spacing:.04em;
  border:1px solid var(--slate-700);padding:1px 5px}
.cbm-active .cbm-tag{color:var(--cyan-400);border-color:rgba(6,182,212,.4)}
.cbm-entry .cbm-desc{color:var(--slate-500);font-size:10px;line-height:1.4}
.cbm-active .cbm-desc{color:var(--slate-400)}
.cbm-energy{color:var(--yellow-500);font-size:11px;text-shadow:0 0 5px rgba(234,179,8,.3)}

/* Combat */
.combat-top{display:flex;justify-content:space-between;gap:12px;
  border-bottom:1px solid var(--red-900);padding-bottom:12px;margin-bottom:12px;
  flex-wrap:wrap}
.combat-enemy{flex:1;min-width:200px}
.combat-ename{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.combat-ename .ce-glyph{
  background:var(--red-600);color:var(--black);font-weight:700;
  padding:1px 6px;box-shadow:0 0 8px rgba(220,38,38,.8);
}
.combat-ename .ce-name{
  color:var(--red-500);font-size:14px;font-weight:700;letter-spacing:.04em;
  text-shadow:0 0 5px rgba(239,68,68,.8);
}
.combat-edesc{color:var(--slate-400);font-size:10px;max-width:360px;line-height:1.5;margin-bottom:6px}
.combat-ehp{display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.5);
  border:1px solid var(--slate-800);padding:6px 10px;max-width:360px}
.combat-ehp .ehp-label{color:var(--slate-500);font-size:9px;text-transform:uppercase;letter-spacing:.08em}
.combat-ehp .ehp-bar{color:var(--orange-500);font-weight:700;letter-spacing:.1em}
.combat-ehp .ehp-status{color:var(--slate-400);font-size:10px;
  background:var(--slate-900);border:1px solid var(--slate-700);padding:1px 5px;margin-left:4px}
.combat-info{
  background:rgba(127,29,29,.08);border:1px solid var(--red-900);
  padding:8px 12px;min-width:140px;display:flex;flex-direction:column;justify-content:center;
  box-shadow:inset 0 0 20px rgba(220,38,38,.05);
}
.combat-info .ci-row{display:flex;justify-content:space-between;margin:3px 0;font-size:11px}
.combat-info .ci-row .ci-label{color:var(--slate-500);text-transform:uppercase;font-size:9px;letter-spacing:.04em}
.combat-info .ci-row .ci-val-w{color:var(--white);font-weight:700}
.combat-info .ci-row .ci-val-r{color:var(--red-400)}
.combat-info .ci-div{height:1px;background:var(--red-900);margin:4px 0}
.combat-info .ci-stance{color:var(--yellow-500);font-weight:700;
  animation:cdda-pulse 2s ease-in-out infinite;text-shadow:0 0 5px rgba(234,179,8,.5)}
.combat-log-hd{color:var(--slate-500);font-size:9px;text-transform:uppercase;
  letter-spacing:.08em;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.combat-log-hd .cl-div{flex:1;height:1px;background:var(--slate-800)}
.combat-log-box{
  background:rgba(0,0,0,.6);border:1px solid var(--slate-800);
  padding:10px 12px;max-height:280px;overflow-y:auto;
  box-shadow:inset 0 0 30px rgba(0,0,0,.9);font-size:11px;
}
.combat-log-box .cl-entry{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.cl-entry .cl-time{
  width:52px;flex-shrink:0;text-align:right;padding-right:8px;
  border-right:1px solid var(--slate-800);color:var(--slate-500);font-size:10px;
}
.cl-entry .cl-msg{flex:1}
.cl-dim{color:var(--slate-500)}.cl-warn{color:var(--yellow-400)}
.cl-act{color:var(--slate-300)}.cl-hit{color:var(--slate-200)}
.cl-dmg{color:var(--green-500);text-shadow:0 0 3px rgba(34,197,94,.3);
  background:rgba(34,197,94,.05);padding:3px 6px;border-left:2px solid var(--green-700);margin-left:52px}
.cl-danger{color:var(--red-400);font-weight:700;
  animation:critical-danger 2s infinite;
  border-left:2px solid var(--red-600);padding:3px 6px;background:rgba(127,29,29,.1)}
@keyframes critical-danger{
  0%,100%{text-shadow:0 0 5px rgba(248,113,113,.5);color:var(--red-400)}
  50%{text-shadow:0 0 15px rgba(248,113,113,.9);color:var(--red-300)}
}
.cl-wait{display:flex;align-items:center;gap:6px;opacity:.4;margin-left:52px;margin-top:10px}
.cl-wait i{display:block;width:4px;height:8px;background:var(--slate-500);animation:cdda-pulse 1.5s infinite}
.cl-wait span{font-size:10px;color:var(--slate-500)}

/* Utility */
.hidden{display:none!important}.empty-msg{color:var(--slate-600);font-size:11px;padding:12px}
</style>
</head>
<body>
<div class="app-root crt" id="cdda-root">

<div class="hud-corner hud-tl"></div><div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div><div class="hud-corner hud-br"></div>

<!-- LEFT: main terminal -->
<div class="term-main">
  <div class="term-bar">
    <span class="bar-title">C:/> CDDA_PROTOCOL_ACTIVE</span>
    <div class="bar-btns">
      <button class="bar-btn btn-inv" data-open="inv">[I] 物品栏</button>
      <button class="bar-btn btn-mut" data-open="mut">[M] 变异/CBM</button>
      <button class="bar-btn btn-com" data-open="combat">[C] 战斗</button>
    </div>
  </div>
  <div class="term-screen" id="cdda-screen"></div>
  <div class="term-opts" id="cdda-opts"></div>
  <div class="term-cmd">
    <span class="gprompt">&gt;</span>
    <input id="cdda-input" placeholder="输入你的下一步行动..." autocomplete="off">
  </div>
</div>

<!-- RIGHT: status panels -->
<div class="term-side" id="cdda-side">
  <fieldset class="fs-card">
    <legend>┌── 生命值区 ──┐</legend>
    <div id="cdda-hp"></div>
  </fieldset>
  <fieldset class="fs-card">
    <legend>┌── 属性与技能区 ──┐</legend>
    <div id="cdda-stat"></div>
  </fieldset>
  <fieldset class="fs-card">
    <legend>┌── 装备与状态区 ──┐</legend>
    <div id="cdda-eq"></div>
  </fieldset>
  <fieldset class="fs-card">
    <legend>┌── 环境信息区 ──┐</legend>
    <div id="cdda-env"></div>
  </fieldset>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-inv">
  <div class="modal-box">
    <div class="modal-hd">
      <span class="mh-title">=== INVENTORY / 物品栏 ===</span>
      <button class="mh-close">[X] 关闭</button>
    </div>
    <div class="modal-bd">
      <div class="inv-grid" id="cdda-inv"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-mut">
  <div class="modal-box">
    <div class="modal-hd">
      <span class="mh-title">=== BIOMETRICS / 变异与CBM ===</span>
      <button class="mh-close">[X] 关闭</button>
    </div>
    <div class="modal-bd">
      <div class="mut-grid" id="cdda-mut"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-combat">
  <div class="modal-box">
    <div class="modal-hd">
      <span class="mh-title">=== TACTICAL OVERVIEW / 战斗态势 ===</span>
      <button class="mh-close">[X] 关闭</button>
    </div>
    <div class="modal-bd" id="cdda-combat"></div>
  </div>
</div>

</div>
<script>
(function(){
var NL=String.fromCharCode(10),busy=!1;
function $(id){return document.getElementById(id)}
function esc(s){return String(null==s?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function num(v,d){return(v=Number(v)),Number.isFinite(v)?v:d}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function val(o,k,d){return null!=o&&null!=o[k]?o[k]:d}

function renderBar(cur,max,seg,opt){
  opt=opt||{full:'|',empty:'.'};
  var r=Math.max(0,Math.min(1,cur/max));
  var f=Math.round(r*seg);
  return opt.full.repeat(f)+opt.empty.repeat(seg-f);
}

function gv(){try{if('function'==typeof getAllVariables){var a=getAllVariables();return a&&a.stat_data?a.stat_data:a}if('function'==typeof getVariables){var g=getVariables({type:'message'});return g&&g.stat_data?g.stat_data:g}if('undefined'!=typeof Mvu&&Mvu&&'function'==typeof Mvu.getMvuData){var m=Mvu.getMvuData({type:'message',message_id:'latest'});return m&&m.stat_data?m.stat_data:{}}}catch(e){}return{}}
function gm(){try{if('function'==typeof getLastMessageId&&'function'==typeof getChatMessages){for(var l=getLastMessageId(),i=l;i>=0&&i>l-40;i--){var m=getChatMessages(i,{role:'assistant'});if(m&&m.length&&m[0].message)return m[0].message}var f=getChatMessages(l);return f&&f[0]?f[0].message:''}}catch(e){}return''}
function tag(t,n){var r=new RegExp('<'+n+'>([\s\S]*?)(?:<\/'+n+'>|$)','i'),m=String(t||'').match(r);return m?m[1].trim():''}
function clean(t){return String(t||'').replace(/<thinking>[\s\S]*?<\/thinking>/gi,'').replace(/<think>[\s\S]*?<\/think>/gi,'').replace(/<UpdateVariable>[\s\S]*?<\/UpdateVariable>/gi,'').replace(/<StatusPlaceHolderImpl\s*\/?>/gi,'').trim()}
function parseMsg(t){t=String(t||'');var main=tag(t,'maintext')||clean(t),raw=tag(t,'option'),opts=[];if(raw){raw.split(/\n+/).map(function(x){return x.trim()}).filter(Boolean).slice(0,4).forEach(function(x,i){var mm=x.match(/^([A-Za-z0-9\u4e00\u4e8c\u4e09\u56db])\s*[.\u3001\uff0e:]\s*(.*)$/);opts.push({id:mm?mm[1].toUpperCase():String(i+1),text:mm?mm[2].trim():x})})}return{main:main,opts:opts}}
function d(){var v=gv();return{w:v['\u4e16\u754c']||{},p:v['\u73a9\u5bb6']||{},c:v['\u6218\u6597']||{},g:v['\u8fdb\u5ea6']||{}}}

function locGlyph(area){
  var a=String(area||'');
  if(a.indexOf('\u68ee\u6797')>=0)return'<span class="glyph glyph-f">F</span>';
  if(a.indexOf('\u5c0f\u5c4b')>=0||a.indexOf('\u6728\u5c4b')>=0)return'<span class="glyph glyph-h">^</span>';
  if(a.indexOf('\u65f7\u91ce')>=0||a.indexOf('\u8352\u91ce')>=0||a.indexOf('\u8349\u5730')>=0)return'<span class="glyph glyph-w">.</span>';
  if(a.indexOf('\u57ce\u5e02')>=0||a.indexOf('\u8857')>=0||a.indexOf('\u6c11\u5b85')>=0)return'<span class="glyph glyph-c">C</span>';
  return'<span class="glyph glyph-s">+</span>';
}

function hpRow(lbl,cur,max,seg,cls){
  return'<div class="hp-row '+cls+'"><span class="hp-label">'+esc(lbl)+'</span><span class="hp-bar">'+renderBar(cur,max,seg)+'</span><span class="hp-val">'+cur+'/'+max+'</span></div>';
}
function renderHp(p){
  var la=val(p,'HP_\u5de6\u81c2',val(p,'HP_\u81c2',80)),ra=val(p,'HP_\u53f3\u81c2',val(p,'HP_\u81c2',80)),
      ll=val(p,'HP_\u5de6\u817f',val(p,'HP_\u817f',80)),rl=val(p,'HP_\u53f3\u817f',val(p,'HP_\u817f',80));
  return hpRow('\u5934\u90e8',val(p,'HP_\u5934',80),80,5,'hp-green')
    +hpRow('\u8eaf\u5e72',val(p,'HP_\u8eaf',80),80,5,'hp-green')
    +'<div class="hp-flex">'+hpRow('\u5de6\u81c2',la,80,5,'hp-green')+hpRow('\u53f3\u81c2',ra,80,5,'hp-green')+'</div>'
    +'<div class="hp-flex">'+hpRow('\u5de6\u817f',ll,80,5,'hp-green')+hpRow('\u53f3\u817f',rl,80,5,'hp-green')+'</div>'
    +'<div class="hp-divider"></div>'
    +hpRow('\u8010\u529b',val(p,'\u8010\u529b',100),val(p,'\u6700\u5927\u8010\u529b',100),10,'hp-cyan')
    +hpRow('\u75bc\u75db',val(p,'\u75bc\u75db',0),100,10,'hp-red')
    +hpRow('\u75b2\u52b3',val(p,'\u75b2\u52b3',0),100,10,'hp-orange');
}

function renderStat(p){
  return'<div class="stat-grid"><span>\u529b\u91cf<span class="stv">'+val(p,'\u529b\u91cf',8)+'</span></span><span>\u654f\u6377<span class="stv">'+val(p,'\u654f\u6377',8)+'</span></span><span>\u667a\u529b<span class="stv">'+val(p,'\u667a\u529b',8)+'</span></span><span>\u611f\u77e5<span class="stv">'+val(p,'\u611f\u77e5',8)+'</span></span></div>'
    +'<div class="hp-divider"></div>'
    +'<div class="stat-list"><span>\u8fd1\u6218<span class="sv-cyan">'+val(p,'\u8fd1\u6218',1)+'</span></span><span>\u95ea\u907f<span class="sv-dim">'+val(p,'\u95ea\u907f',0)+'</span></span><span>\u67aa\u6cd5<span class="sv-dim">'+val(p,'\u67aa\u6cd5',0)+'</span></span><span>\u673a\u68b0\u5b66<span class="sv-dim">'+val(p,'\u673a\u68b0\u5b66',0)+'</span></span><span>\u533b\u7597<span class="sv-dim">'+val(p,'\u533b\u7597',0)+'</span></span></div>';
}

function renderEq(p){
  return'<div class="eq-row"><span class="eq-label">\u624b\u6301:</span><span class="eq-val-w">'+esc(val(p,'\u624b\u6301\u6b66\u5668',val(p,'\u6b66\u5668','\u957f\u6728\u68cd')))+'</span></div>'
    +'<div class="eq-row"><span class="eq-label">\u62a4\u7532:</span><span class="eq-val-d">'+esc(val(p,'\u62a4\u7532\u6982\u8ff0','\u65e0\u62a4\u7532\uff0c\u4ec5\u7a7f\u7740\u666e\u901a\u8863\u7269'))+'</span></div>'
    +'<div class="eq-row"><span class="eq-label">\u6d41\u6d3e:</span><span class="eq-val-p">'+esc(val(p,'\u6b66\u672f\u6d41\u6d3e','\u6597\u6bb4\u6280'))+'</span></div>'
    +'<div class="hp-divider"></div>'
    +'<div class="eq-status"><span>\u9965\u997f: <b>'+esc(val(p,'\u9965\u997f\u5ea6','\u6b63\u5e38'))+'</b></span><span>\u53e3\u6e34: <b>'+esc(val(p,'\u53e3\u6e34\u5ea6','\u6b63\u5e38'))+'</b></span><span>\u6e29\u5ea6: <b>'+esc(val(p,'\u6e29\u5ea6','\u8212\u9002'))+'</b></span></div>';
}

function renderEnv(w){
  return'<div class="env-row"><span class="env-label">\u65f6\u95f4:</span><span class="env-time">'+val(w,'\u65e5\u671f','2026/04/30')+' '+val(w,'\u65f6\u95f4','08:00')+'</span></div>'
    +'<div class="env-row"><span class="env-label">\u5929\u6c14:</span><span class="env-weather">'+esc(val(w,'\u5929\u6c14','\u6674'))+'</span></div>'
    +'<div class="env-row"><span class="env-label">\u5730\u70b9:</span><span class="env-glyph">'+locGlyph(val(w,'\u5f53\u524d\u533a\u57df','\u7d27\u6025\u907f\u96be\u6240'))+'<span class="env-loc">'+esc(val(w,'\u5f53\u524d\u533a\u57df','\u7d27\u6025\u907f\u96be\u6240'))+'</span></span></div>'
    +'<div class="env-row"><span class="env-label">\u6708\u76f8:</span><span style="color:var(--slate-400)">'+esc(val(w,'\u6708\u76f8','\u65b0\u6708'))+'</span></div>';
}

function ls(x){
  if(!Array.isArray(x)||!x.length)return'<span class="empty-msg">// \u6682\u65e0\u6570\u636e</span>';
  return x.map(function(i){return'<span>'+esc(i)+'</span>'}).join('');
}

function renderInv(p){
  var inv=val(p,'\u7269\u54c1\u680f',{});
  var cats={'\u6b66\u5668':[],'\u836f\u54c1':[],'\u5de5\u5177':[],'\u98df\u7269':[],'\u5f39\u836f':[],'\u6750\u6599':[],'\u4e66\u7c4d':[]};
  Object.keys(inv).forEach(function(k){
    if(k.indexOf('\u6b66\u5668')>=0||k.indexOf('\u68cd')>=0||k.indexOf('\u67aa')>=0)cats['\u6b66\u5668'].push(k);
    else if(k.indexOf('\u836f')>=0||k.indexOf('\u5e26')>=0||k.indexOf('\u9752\u9709\u7d20')>=0)cats['\u836f\u54c1'].push(k);
    else if(k.indexOf('\u624b\u7535')>=0||k.indexOf('\u5de5\u5177')>=0)cats['\u5de5\u5177'].push(k);
    else if(k.indexOf('\u98df')>=0||k.indexOf('\u6c34')>=0||k.indexOf('\u7f50')>=0)cats['\u98df\u7269'].push(k);
    else if(k.indexOf('\u5f39')>=0||k.indexOf('\u5b50\u5f39')>=0)cats['\u5f39\u836f'].push(k);
    else if(k.indexOf('\u6750\u6599')>=0||k.indexOf('\u5e03')>=0||k.indexOf('\u94c1')>=0)cats['\u6750\u6599'].push(k);
    else if(k.indexOf('\u4e66')>=0)cats['\u4e66\u7c4d'].push(k);
    else cats['\u5de5\u5177'].push(k);
  });
  var h='';var hasAny=!1;
  Object.keys(cats).forEach(function(cn){
    var items=cats[cn];
    if(!items.length)return;
    hasAny=!0;h+='<div class="inv-cat"><div class="inv-cat-hd">/ '+cn+'</div>';
    items.forEach(function(k){h+='<div class="inv-item"><span class="inv-name">'+esc(k)+'</span><span class="inv-qty">x '+esc(inv[k])+'</span></div>'});
    h+='</div>';
  });
  return hasAny?h:'<span class="empty-msg">// \u7269\u54c1\u680f\u4e3a\u7a7a</span>';
}

function renderMut(p){
  var muts=val(p,'\u53d8\u5f02\u5217\u8868',val(p,'\u53d8\u5f02',[]));
  var cbms=val(p,'CBM\u5217\u8868',val(p,'CBM',[]));
  var ml='<div class="mut-hd mh-green">/ \u5df2\u83b7\u53d6\u53d8\u5f02</div>';
  if(!Array.isArray(muts)||!muts.length)ml+='<span class="empty-msg">// \u6682\u65e0\u53d8\u5f02</span>';
  else muts.forEach(function(m){
    var cls='mut-neut',mk='[~]';var t=String(m||'');
    if(t.indexOf('\u826f\u6027')>=0||t.indexOf('\u6b63\u9762')>=0){cls='mut-good';mk='[*]'}
    else if(t.indexOf('\u6076\u6027')>=0||t.indexOf('\u8d1f\u9762')>=0){cls='mut-bad';mk='[-]'}
    ml+='<div class="mut-entry '+cls+'"><span class="mut-marker">'+mk+'</span><div><div class="mut-name">'+esc(t)+'</div></div></div>';
  });
  var cr='<div class="mut-hd mh-cyan">/ \u5df2\u5b89\u88c5CBM\u6a21\u5757</div>';
  if(!Array.isArray(cbms)||!cbms.length)cr+='<span class="empty-msg">// \u6682\u65e0CBM</span>';
  else cbms.forEach(function(c){cr+='<div class="cbm-entry cbm-active"><div class="cbm-top"><span class="cbm-name">'+esc(c)+'</span><span class="cbm-tag">active</span></div></div>'});
  return'<div class="mut-col">'+ml+'</div><div class="mut-col">'+cr+'</div>';
}

function renderCombat(c){
  var en=esc(val(c,'\u5f53\u524d\u654c\u4eba',val(c,'\u654c\u4eba','\u65e0')));
  var cnt=esc(val(c,'\u654c\u4eba\u6570\u91cf',0));
  var stance=esc(val(c,'\u6218\u6597\u6001\u52bf',val(c,'\u72b6\u6001','\u5b89\u5168')));
  var logs=val(c,'\u6218\u6597\u65e5\u5fd7',[]);
  var logH='';
  if(Array.isArray(logs)&&logs.length){
    logs.forEach(function(l,i){
      var cls='cl-entry cl-dim';if(i===logs.length-1)cls='cl-entry cl-danger';
      logH+='<div class="'+cls+'"><span class="cl-time">['+(i+1)+']</span><span class="cl-msg">'+esc(l)+'</span></div>';
    });
  }else logH='<span class="empty-msg">// \u6682\u65e0\u6218\u6597\u65e5\u5fd7</span>';
  return'<div class="combat-top"><div class="combat-enemy"><div class="combat-ename"><span class="ce-glyph">Z</span><span class="ce-name">'+en+'</span></div><div class="combat-edesc">'+esc(val(c,'\u654c\u4eba\u63cf\u8ff0',''))+'</div></div><div class="combat-info"><div class="ci-row"><span class="ci-label">\u6570\u91cf:</span><span class="ci-val-w">'+cnt+'</span></div><div class="ci-row"><span class="ci-label">\u8ddd\u79bb:</span><span class="ci-val-r">'+esc(val(c,'\u8ddd\u79bb','--'))+'</span></div><div class="ci-div"></div><div class="ci-row"><span class="ci-label">\u6001\u52bf:</span><span class="ci-stance">'+stance+'</span></div></div></div><div class="combat-log-hd"><span>====== \u6218\u6597\u65e5\u5fd7\u8bb0\u5f55 ======</span><span class="cl-div"></span></div><div class="combat-log-box">'+logH+'</div>';
}

function render(){
  var dt=d(),p=dt.p,w=dt.w,c=dt.c,msg=parseMsg(gm());
  // Screen - show status line, not full narrative
  $('cdda-screen').innerHTML='<div class="sys-boot">SYSTEM REBOOT...\nLOADING KERNEL... OK\nMOUNTING VIRTUAL FILESYSTEM... OK\nINITIALIZING LLM BIO-INTERFACE... [ACTIVE]\n\n================================================</div>'+(msg.main?'<div class="msg-row">'+esc(msg.main)+'</div>':'<div class="msg-row">\u7b49\u5f85\u4e0b\u4e00\u8f6e\u884c\u52a8...</div>')+'<div class="term-loader"><i></i><span>\u7b49\u5f85\u8f93\u5165\u6307\u4ee4...</span></div>';
  // Options
  var oe=$('cdda-opts');
  if(msg.opts.length){oe.innerHTML=msg.opts.map(function(o){return'<button class="term-opt" data-opt="'+esc(o.id)+'">['+esc(o.id)+'] '+esc(o.text)+'</button>'}).join('');oe.classList.remove('hidden')}
  else oe.classList.add('hidden');
  // Panels
  $('cdda-hp').innerHTML=renderHp(p);
  $('cdda-stat').innerHTML=renderStat(p);
  $('cdda-eq').innerHTML=renderEq(p);
  $('cdda-env').innerHTML=renderEnv(w);
  // Modals (lazy render)
  $('cdda-inv').innerHTML=renderInv(p);
  $('cdda-mut').innerHTML=renderMut(p);
  $('cdda-combat').innerHTML=renderCombat(c);
}

function sb(v){$('cdda-input').disabled=v}
async function cd(){try{if('function'==typeof Mvu?.getMvuData)return Mvu.getMvuData({type:'message',message_id:'latest'})}catch(e){}return{stat_data:gv()}}
function nr(r){var t=String(r||'');return/<maintext>/i.test(t)||(t='<maintext>'+clean(t)+'</maintext>'),/<StatusPlaceHolderImpl\s*\/?>/i.test(t)||(t+='\n\n<StatusPlaceHolderImpl/>'),t}
async function send(t){if(!(t=String(t||'').trim()))return;try{sb(!0),$('cdda-screen').innerHTML='<div class="msg-cmd"><span class="gprompt">&gt;</span><span>'+esc(t)+'</span></div><div class="term-loader"><i></i><span>\u54cd\u5e94\u4e2d...</span></div>',$('cdda-input').value='';var dt=await cd();'function'==typeof createChatMessages&&await createChatMessages([{role:'user',message:t,data:dt}],{refresh:'none'});var reply='';'function'==typeof generate&&(reply=await generate({user_input:t,should_stream:!0})),reply=nr(reply);if('function'==typeof Mvu?.parseMessage)try{var p=await Mvu.parseMessage(reply,dt.stat_data||{});p&&(dt={stat_data:p})}catch(e){}'function'==typeof createChatMessages&&await createChatMessages([{role:'assistant',message:reply,data:dt}],{refresh:'none'}),setTimeout(render,300)}catch(e){$('cdda-screen').innerHTML='<div class="cl-danger">// ERROR: '+esc(e&&e.message||e)+'</div>'}finally{sb(!1)}}

document.addEventListener('click',function(e){
  var b=e.target.closest('[data-open]');if(b)return $('modal-'+b.getAttribute('data-open')).classList.add('on');
  var c=e.target.closest('.mh-close');if(c)return c.closest('.modal-overlay').classList.remove('on');
  var o=e.target.closest('[data-opt]');if(o){send(o.textContent.replace(/^\[[^\]]+\]\s*/,''));return}
});
$('cdda-input').addEventListener('keydown',function(e){'Enter'===e.key&&send(this.value)});
document.querySelectorAll('.modal-overlay').forEach(function(m){m.addEventListener('click',function(e){e.target===m&&m.classList.remove('on')})});

render();setInterval(render,1500);
try{'function'==typeof eventOn&&(eventOn('MESSAGE_UPDATED',render),eventOn('MESSAGE_RECEIVED',function(){setTimeout(render,500)}),eventOn('CDDA_PANEL_REFRESH',render))}catch(e){}
})();
</script>
</body>
