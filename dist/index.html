<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
:root{--bg:#030406;--panel:#06090c;--line:#334155;--dim:#64748b;--text:#cbd5e1;--green:#22c55e;--cyan:#22d3ee;--red:#ef4444;--yellow:#eab308}
*{box-sizing:border-box}body{margin:0;background:#000;color:var(--text);font-family:"Consolas","Lucida Console","Courier New",monospace;font-size:13px}.cdda-root{min-height:560px;background:radial-gradient(circle at center,#0b1118 0,#030406 52%,#000 100%);border:1px solid #1e293b;padding:10px;position:relative;overflow:hidden}.cdda-root:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.025),rgba(255,255,255,.025) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:3}.cdda-frame{position:relative;z-index:2;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:10px;min-height:540px}.box{background:rgba(6,9,12,.96);border:1px solid var(--line);box-shadow:inset 0 0 36px rgba(0,0,0,.75)}.title{color:var(--dim);border-bottom:1px solid #1e293b;padding:8px 10px;font-weight:bold;letter-spacing:.12em}.main{display:flex;flex-direction:column;min-height:540px}.screen{flex:1;padding:14px;overflow:auto;white-space:pre-wrap;line-height:1.65}.cmd{display:flex;gap:8px;border-top:1px solid #1e293b;padding:10px;background:#020617}.cmd span{color:var(--green);font-weight:bold}.cmd input{flex:1;background:transparent;border:0;outline:0;color:#fff;font-family:inherit}.cmd button{background:#03131a;border:1px solid #155e75;color:#a5f3fc;font-family:inherit;padding:5px 12px;cursor:pointer}.cmd button:disabled{opacity:.45;cursor:not-allowed}.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.opt,.btn{background:#020617;color:var(--text);border:1px solid #334155;padding:7px 9px;font-family:inherit;text-align:left;cursor:pointer}.opt:hover,.btn:hover{border-color:var(--cyan);color:#fff}.side{display:grid;grid-template-rows:auto auto auto auto 1fr;gap:10px}.section{padding:10px}.sec-title{color:var(--cyan);border-bottom:1px dashed #334155;margin-bottom:8px;padding-bottom:4px}.row{display:flex;justify-content:space-between;gap:8px;margin:5px 0}.bar{height:10px;border:1px solid #475569;background:#020617;position:relative}.bar i{display:block;height:100%;background:var(--green)}.bar.red i{background:var(--red)}.bar.yellow i{background:var(--yellow)}.hpgrid{display:grid;grid-template-columns:42px 1fr 34px;gap:5px;align-items:center}.map{color:#94a3b8;line-height:1.25;white-space:pre}.modal{display:none;position:absolute;inset:32px;z-index:5;background:#020617;border:1px solid #64748b;box-shadow:0 0 0 9999px rgba(0,0,0,.62),inset 0 0 60px #000}.modal.on{display:block}.modal-head{display:flex;justify-content:space-between;border-bottom:1px solid #334155;padding:10px;color:var(--cyan);font-weight:bold}.modal-body{padding:12px;max-height:420px;overflow:auto}.close{background:#111827;color:#fff;border:1px solid #475569;font-family:inherit;cursor:pointer}.pill{display:inline-block;border:1px solid #334155;padding:3px 6px;margin:3px;color:#cbd5e1;background:#020617}.warn{color:var(--yellow)}.bad{color:var(--red)}.good{color:var(--green)}@media(max-width:760px){.cdda-frame{grid-template-columns:1fr}.side{grid-template-rows:auto}.cdda-root{min-height:900px}}

.status-card{background:linear-gradient(180deg,rgba(10,16,18,.86),rgba(3,5,6,.94));border:1px solid #2b4650;box-shadow:0 14px 32px rgba(0,0,0,.45),inset 0 0 30px rgba(0,0,0,.65);backdrop-filter:blur(8px)}
.ascii{margin:0;white-space:pre;font-size:12px;line-height:1.42;color:#c9d8d4;text-shadow:0 0 10px rgba(105,210,223,.08)}
.loc{display:inline-block;min-width:18px;text-align:center;border:1px solid #52626a;background:#f4f1e8;color:#111;font-weight:900;box-shadow:0 0 16px rgba(244,241,232,.18)}
.loc.forest{background:#17331f;color:#8fd074;border-color:#315b36}.loc.field{background:#111;color:#b6b6a1}.loc.cabin{background:#5a351d;color:#f2c78c}.loc.city{background:#26323a;color:#c8d7de}
.modal{background:linear-gradient(180deg,rgba(8,13,15,.96),rgba(2,3,4,.98));border-color:#55717b;box-shadow:0 0 0 9999px rgba(0,0,0,.68),0 0 60px rgba(105,210,223,.18),inset 0 0 70px #000}.modal.on{animation:cddaRise .18s ease-out}@keyframes cddaRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.tab{border:1px solid #344b54;background:#05090b;color:#748681;padding:5px 8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.item,.log{border:1px solid #253b43;background:#05090b;padding:8px;margin:6px 0}.good{color:#8fb36a}.bad{color:#cf6f77}.neutral{color:#c68adf}.dim{color:#748681}
</style>
</head>
<body>
<div class="cdda-root" id="cdda-root">
  <div class="cdda-frame">
    <div class="box main">
      <div class="title">C:\$ CDDA_SURVIVAL_PROTOCOL v3.0</div>
      <div class="screen" id="cdda-main">CATACLYSM: DARK DAYS AHEAD
XE-037 MONITOR: BOOTING

正在读取楼层文本与 MVU 变量...</div>
      <div class="cmd"><span>&gt;</span><input id="cdda-input" placeholder="输入你的行动..." autocomplete="off"><button id="cdda-send">发送</button></div>
    </div>
    <div class="side">
      <div class="box section"><div class="sec-title">生命值</div><div id="cdda-hp"></div></div>
      <div class="box section"><div class="sec-title">属性与技能</div><div id="cdda-stat"></div></div>
      <div class="box section"><div class="sec-title">装备与状态</div><div id="cdda-eq"></div><div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px"><button class="btn" data-open="inv">物品栏</button><button class="btn" data-open="mut">变异/CBM</button><button class="btn" data-open="combat">战斗</button></div></div>
      <div class="box section"><div class="sec-title">环境信息</div><div id="cdda-env"></div></div>
      <div class="box section"><div class="sec-title">局部地图</div><div class="map" id="cdda-map"></div></div>
    </div>
  </div>
  <div class="modal" id="modal-inv"><div class="modal-head">物品栏 <button class="close">关闭</button></div><div class="modal-body" id="cdda-inv"><div class="tabs"><span class="tab">武器</span><span class="tab">药品</span><span class="tab">工具</span><span class="tab">食物</span><span class="tab">弹药</span><span class="tab">材料</span><span class="tab">书籍</span></div></div></div>
  <div class="modal" id="modal-mut"><div class="modal-head">变异与 CBM <button class="close">关闭</button></div><div class="modal-body grid2" id="cdda-mut"></div></div>
  <div class="modal" id="modal-combat"><div class="modal-head">战斗信息 <button class="close">关闭</button></div><div class="modal-body" id="cdda-combat"></div></div>
</div>
<script>
(function(){
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function num(v,d){v=Number(v);return Number.isFinite(v)?v:d}
function pct(v,m){return Math.max(0,Math.min(100,Math.round(num(v,0)/num(m,100)*100)))}
function bar(v,m,cls){var p=pct(v,m);return '<div class="bar '+(cls||'')+'"><i style="width:'+p+'%"></i></div>'}
function val(o,k,d){return o&&o[k]!=null?o[k]:d}
function getVars(){try{if(typeof getAllVariables==='function'){var a=getAllVariables();return a&&a.stat_data?a.stat_data:a}if(typeof Mvu!=='undefined'&&Mvu&&typeof Mvu.getMvuData==='function'){var m=Mvu.getMvuData({type:'message',message_id:'latest'});return m&&m.stat_data?m.stat_data:{}}}catch(e){}return {}}
function getMsgs(){try{if(typeof getLastMessageId==='function'&&typeof getChatMessages==='function'){var last=getLastMessageId();for(var id=last;id>=0&&id>last-40;id--){var ms=getChatMessages(id,{role:'assistant'});if(ms&&ms.length&&ms[0].message)return ms[0].message}var fallback=getChatMessages(last);return fallback&&fallback[0]?fallback[0].message:''}}catch(e){}return ''}
function tag(t,n){var r=new RegExp('<'+n+'>([\\s\\S]*?)(?:<\\/'+n+'>|$)','i');var m=String(t||'').match(r);return m?m[1].trim():''}
function clean(t){return String(t||'').replace(/<thinking>[\s\S]*?<\/thinking>/gi,'').replace(/<think>[\s\S]*?<\/think>/gi,'').replace(/<UpdateVariable>[\s\S]*?<\/UpdateVariable>/gi,'').replace(/<StatusPlaceHolderImpl\s*\/?>/gi,'').trim()}
function parseMsg(t){t=String(t||'');var main=tag(t,'maintext')||clean(t);var raw=tag(t,'option');var opts=[];if(raw){raw.split(/\n+/).map(function(x){return x.trim()}).filter(Boolean).slice(0,4).forEach(function(x,i){var mm=x.match(/^([A-Za-z0-9一二三四])\s*[\.、．:]\s*(.*)$/);opts.push({id:mm?mm[1].toUpperCase():String(i+1),text:mm?mm[2].trim():x})})}return {main:main,opts:opts}}
function data(){var v=getVars();return {w:v['世界']||{},p:v['玩家']||{},c:v['战斗']||{},g:v['进度']||{}}}

function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function cbar(v,max,cells){var f=clamp(Math.round(num(v,0)/num(max,100)*cells),0,cells);return '|'.repeat(f)+'.'.repeat(cells-f)}
function topLine(title,w){var t=' '+title+' ',l=Math.floor((w-t.length)/2),r=w-t.length-l;return '┌'+'─'.repeat(l)+t+'─'.repeat(r)+'┐'}
function botLine(w){return '└'+'─'.repeat(w)+'┘'}
function boxRow(t,w){t=String(t);return '│ '+(t.length>w-2?t.slice(0,w-3)+'…':t+' '.repeat(w-2-t.length))+' │'}
function locGlyph(area){var a=String(area||'');if(a.includes('森林'))return '<span class="loc forest">F</span>';if(a.includes('小屋')||a.includes('木屋'))return '<span class="loc cabin">^</span>';if(a.includes('旷野')||a.includes('荒野')||a.includes('草地'))return '<span class="loc field">.</span>';if(a.includes('城市')||a.includes('街')||a.includes('民宅'))return '<span class="loc city">C</span>';return '<span class="loc">+</span>'}
function asciiHp(p){var w=38,la=val(p,'HP_左臂',val(p,'HP_臂',80)),ra=val(p,'HP_右臂',val(p,'HP_臂',80)),ll=val(p,'HP_左腿',val(p,'HP_腿',80)),rl=val(p,'HP_右腿',val(p,'HP_腿',80));return [topLine('生命值',w),boxRow('头部 '+cbar(val(p,'HP_头',80),80,5)+' '+val(p,'HP_头',80)+'/80',w),boxRow('躯干 '+cbar(val(p,'HP_躯',80),80,5)+' '+val(p,'HP_躯',80)+'/80',w),boxRow('左臂 '+cbar(la,80,5)+' '+la+'/80  右臂 '+cbar(ra,80,5)+' '+ra+'/80',w),boxRow('左腿 '+cbar(ll,80,5)+' '+ll+'/80  右腿 '+cbar(rl,80,5)+' '+rl+'/80',w),boxRow('耐力 '+cbar(val(p,'耐力',100),val(p,'最大耐力',100),10)+' '+val(p,'耐力',100)+'/'+val(p,'最大耐力',100),w),boxRow('疼痛 '+cbar(val(p,'疼痛',0),100,10)+' '+val(p,'疼痛',0),w),boxRow('疲劳 '+cbar(val(p,'疲劳',0),100,10)+' '+val(p,'疲劳',0),w),botLine(w)].join('\\n')}
function asciiStat(p){var w=38;return [topLine('属性与技能',w),boxRow('力量 '+val(p,'力量',8)+'  敏捷 '+val(p,'敏捷',8)+'  智力 '+val(p,'智力',8)+'  感知 '+val(p,'感知',8),w),boxRow('近战 '+val(p,'近战',1)+'  闪避 '+val(p,'闪避',0)+'  枪法 '+val(p,'枪法',0),w),boxRow('机械学 '+val(p,'机械学',0)+'  医疗 '+val(p,'医疗',0),w),botLine(w)].join('\\n')}
function asciiEq(p){var w=38;return [topLine('装备与状态',w),boxRow('手持: '+val(p,'手持武器',val(p,'武器','长木棍')),w),boxRow('护甲: '+val(p,'护甲概述','无护甲，仅穿着普通衣物'),w),boxRow('武术流派: '+val(p,'武术流派','斗殴技'),w),boxRow('饥饿: '+val(p,'饥饿度','正常')+'  口渴: '+val(p,'口渴度','正常'),w),botLine(w)].join('\\n')}
function asciiEnv(wd){var w=38;return [topLine('环境信息',w),boxRow('时间: '+val(wd,'日期','2026/04/30')+' '+val(wd,'时间','08:00'),w),boxRow('天气: '+val(wd,'天气','晴')+'  月相: '+val(wd,'月相','新月'),w),boxRow('地点: '+val(wd,'当前区域','紧急避难所'),w),botLine(w)].join('\\n')}
function render(){var d=data(),p=d.p,w=d.w,c=d.c,msg=parseMsg(getMsgs());$('cdda-main').innerHTML=esc(msg.main||'CATACLYSM: DARK DAYS AHEAD\nXE-037 MONITOR: READY\n\n等待下一轮行动...')+(msg.opts.length?'<div class="opts">'+msg.opts.map(function(o){return '<button class="opt" data-opt="'+esc(o.id)+'">['+esc(o.id)+'] '+esc(o.text)+'</button>'}).join('')+'</div>':'');$('cdda-hp').outerHTML='<pre class="ascii" id="cdda-hp">'+esc(asciiHp(p))+'</pre>';$('cdda-stat').outerHTML='<pre class="ascii" id="cdda-stat">'+esc(asciiStat(p))+'</pre>';$('cdda-eq').outerHTML='<pre class="ascii" id="cdda-eq">'+esc(asciiEq(p))+'</pre>';$('cdda-env').outerHTML='<div id="cdda-env"><pre class="ascii">'+esc(asciiEnv(w))+'</pre><div style="margin-top:8px">'+locGlyph(val(w,'当前区域','紧急避难所'))+' <span class="dim">terrain glyph</span></div></div>';$('cdda-map').textContent='┌────────────┐\\n│ . . F . .  │\\n│ . ^ . . F  │\\n│ . . + . .  │\\n│ F . . . .  │\\n└────────────┘';var inv=val(p,'物品栏',{});$('cdda-inv').innerHTML=Object.keys(inv).length?Object.keys(inv).map(function(k){return '<div class="row"><span>'+esc(k)+'</span><b>'+esc(inv[k])+'</b></div>'}).join(''):'<span class="dim">空</span>';$('cdda-mut').innerHTML='<div>变异</div>'+list(val(p,'变异列表',val(p,'变异',[])))+'<div style="margin-top:12px">CBM</div>'+list(val(p,'CBM列表',val(p,'CBM',[])));$('cdda-combat').innerHTML='<div class="row"><span>当前敌人</span><b>'+esc(val(c,'当前敌人',val(c,'敌人','无')))+'</b></div><div class="row"><span>敌人数量</span><b>'+esc(val(c,'敌人数量',0))+'</b></div><div class="row"><span>战斗态势</span><b>'+esc(val(c,'战斗态势',val(c,'状态','安全')))+'</b></div>'+list(val(c,'战斗日志',[]))}
function list(x){if(!Array.isArray(x)||!x.length)return '<span class="pill">无</span>';return x.map(function(i){return '<span class="pill">'+esc(i)+'</span>'}).join('')}
function setBusy(v){$('cdda-send').disabled=v;$('cdda-input').disabled=v}
async function currentData(){try{if(typeof Mvu!=='undefined'&&Mvu&&typeof Mvu.getMvuData==='function')return Mvu.getMvuData({type:'message',message_id:'latest'})}catch(e){}return {stat_data:getVars()}}
function normalizeReply(r){var t=String(r||'');if(!/<maintext>/i.test(t))t='<maintext>'+clean(t)+'</maintext>';if(!/<StatusPlaceHolderImpl\s*\/?>/i.test(t))t+='\n\n<StatusPlaceHolderImpl/>';return t}
async function send(t){t=String(t||'').trim();if(!t)return;try{setBusy(true);$('cdda-main').innerHTML=esc('> '+t+'\n\n等待响应...');var d=await currentData();if(typeof createChatMessages==='function')await createChatMessages([{role:'user',message:t,data:d}],{refresh:'none'});var reply='';if(typeof generate==='function')reply=await generate({user_input:t,should_stream:true});reply=normalizeReply(reply);if(typeof Mvu!=='undefined'&&Mvu&&typeof Mvu.parseMessage==='function')try{var parsed=await Mvu.parseMessage(reply,d.stat_data||{});if(parsed)d={stat_data:parsed}}catch(e){console.warn('[CDDA] Mvu.parseMessage failed',e)}if(typeof createChatMessages==='function')await createChatMessages([{role:'assistant',message:reply,data:d}],{refresh:'none'});setTimeout(render,300)}catch(e){console.error('[CDDA]',e);$('cdda-main').innerHTML=esc('请求失败: '+(e&&e.message||e))}finally{setBusy(false)}}
document.addEventListener('click',function(e){var b=e.target.closest('[data-open]');if(b){$('modal-'+b.getAttribute('data-open')).classList.add('on')}var c=e.target.closest('.close');if(c)c.closest('.modal').classList.remove('on');var o=e.target.closest('[data-opt]');if(o)send(o.textContent.replace(/^\[[^\]]+\]\s*/,''))});$('cdda-send').addEventListener('click',function(){send($('cdda-input').value);$('cdda-input').value=''});$('cdda-input').addEventListener('keydown',function(e){if(e.key==='Enter'){send(this.value);this.value=''}});render();setInterval(render,1500);try{if(typeof eventOn==='function'){eventOn('MESSAGE_UPDATED',render);eventOn('MESSAGE_RECEIVED',function(){setTimeout(render,500)});eventOn('CDDA_PANEL_REFRESH',render)}}catch(e){}
})();
</script>
</body>
